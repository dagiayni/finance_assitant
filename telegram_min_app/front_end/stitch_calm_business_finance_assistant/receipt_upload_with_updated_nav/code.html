</div>
<div class="grid grid-cols-2 gap-inner_padding">

</div>
<div class="flex flex-col border-b border-[#EFFBDB] pb-2 focus-within:border-secondary transition-colors">

<input class="bg-transparent border-none p-0 font-body-lg text-primary focus:ring-0 w-full" type="text" value="24 Oct 2023"/>

</div>
